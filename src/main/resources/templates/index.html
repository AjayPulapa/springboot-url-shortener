<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>URL Shortener</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            margin: 0;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #333;
        }

        .container {
            max-width: 1100px;
            margin: auto;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: white;
        }

        .form-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        input {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ddd;
            font-size: 14px;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #5a67d8;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            text-align: left;
        }

        th {
            background: #f7f7f7;
        }

        tr:nth-child(even) {
            background: #fafafa;
        }

        a {
            color: #667eea;
            text-decoration: none;
            word-break: break-all;
        }

        a:hover {
            text-decoration: underline;
        }

        /* Responsive Table */
        @media (max-width: 768px) {
            table, thead, tbody, th, td, tr {
                display: block;
            }

            tr {
                margin-bottom: 15px;
                background: white;
                border-radius: 10px;
                padding: 10px;
            }

            th {
                display: none;
            }

            td {
                display: flex;
                justify-content: space-between;
                padding: 8px 0;
            }

            td::before {
                content: attr(data-label);
                font-weight: bold;
                color: #555;
            }
        }
    </style>
</head>

<body>

<div class="container">
    <h2>🔗 URL Shortener</h2>

    <!-- Form Card -->
    <div class="card">
        <form action="/shorten" method="post">
            <div class="form-group">
                <input type="text" name="originalUrl" placeholder="Paste your long URL here..." required>
                <button type="submit">Shorten</button>
            </div>
        </form>
    </div>

    <!-- Table Card -->
    <div class="card">
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Original URL</th>
                <th>Short URL</th>
                <th>Created</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="url : ${urls}">
                <td data-label="ID" th:text="${url.id}"></td>

                <td data-label="Original">
                    <a th:href="${url.originalUrl}" target="_blank"
                       th:text="${url.originalUrl}"></a>
                </td>

                <td data-label="Short">
                    <a th:href="@{/api/u/{code}(code=${url.shortCode})}"
                       th:text="@{/api/u/{code}(code=${url.shortCode})}"
                       target="_blank"></a>
                </td>

                <td data-label="Created" th:text="${url.createdAt}"></td>
            </tr>
            </tbody>
        </table>
    </div>

</div>

</body>
</html>
